name: Daily Harvest

on:
  schedule:
    # Run at midnight UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # 5 hours max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Harvest 100K matches
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          npx tsx scripts/valve-harvest.ts \
            --merge \
            --seq 7350000000 \
            --max 100000 \
            --checkpoint 100000

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "Daily harvest: update data.json with 100K matches"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes --token "$VERCEL_TOKEN"
